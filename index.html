<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>聊天室</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { 
            --p: #1a5276; /* 沉稳的深蓝色 */
            --bg: #e1f5fe; /* 更淡的蓝色背景基调 */
            /* 对话框颜色修改 */
            --msg-in: linear-gradient(135deg, rgba(235, 245, 251, 0.8) 0%, rgba(214, 234, 248, 0.8) 100%); 
            --msg-out: linear-gradient(135deg, rgba(232, 245, 233, 0.9) 0%, rgba(200, 230, 201, 0.9) 100%); /* 浅绿色渐变 */
            --time: #546e7a; 
            --accent: #ffb3c1; 
            --select-blue: #5dade2; 
        }

        /* 增强：动态流动背景 */
        body, html { 
            margin: 0; 
            padding: 0; 
            height: 100%; 
            font-family: -apple-system, "SF Pro Text", sans-serif; 
            background: linear-gradient(-45deg, #f0f7ff, #e1f5fe, #e3f2fd, #f5f9ff); 
            background-size: 400% 400%;
            animation: gradientBG 18s ease-in-out infinite;
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
            -webkit-tap-highlight-color: transparent; 
            position: fixed;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* 导航栏毛玻璃 */
        .header { 
            padding-top: env(safe-area-inset-top); 
            background: rgba(225, 245, 254, 0.4); 
            backdrop-filter: blur(25px); 
            -webkit-backdrop-filter: blur(25px);
            border-bottom: 1px solid rgba(255,255,255,0.3); 
            z-index: 10; 
            flex-shrink: 0; 
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
        }
        .header-inner { height: 44px; display: flex; align-items: center; padding: 0 15px; }
        .av-btn { 
            width: 36px; height: 36px; border-radius: 12px; background: #eee center/cover; 
            cursor: pointer; border: 1px solid rgba(255,255,255,0.4);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex; align-items: center; justify-content: center; color: #fff; font-weight: bold; overflow: hidden;
        }
        .av-btn:active { transform: scale(0.9); }

        #chat { 
            flex: 1; 
            flex-basis: 0;
            overflow-y: auto; 
            padding: 15px; 
            display: flex; 
            flex-direction: column; 
            padding-bottom: 10px; 
            position: relative; 
            z-index: 2; 
            background: transparent !important;
            will-change: transform;
            -webkit-overflow-scrolling: touch;
        }
        #chat::-webkit-scrollbar { width: 4px; }
        #chat::-webkit-scrollbar-thumb { background: rgba(0, 0, 0, 0.1); border-radius: 10px; }

        #unread-badge { 
            position: fixed; bottom: 85px; left: 50%; transform: translateX(-50%); 
            background: var(--p); color: white; padding: 8px 16px; border-radius: 20px; 
            font-size: 13px; font-weight: 600; display: none; z-index: 90; 
            transition: opacity 0.3s, transform 0.3s; 
        }
        #unread-badge.show { display: block; opacity: 1; transform: translateX(-50%) translateY(0); }

        @keyframes slideUpIn { 
            0% { opacity: 0; transform: translateY(15px); } 
            100% { opacity: 1; transform: translateY(0); } 
        }

        @keyframes menuPop { 
            0% { opacity: 0; transform: scale(0.95); } 
            100% { opacity: 1; transform: scale(1); } 
        }

        /* 撤回/删除动画 */
        @keyframes slideOutRight { 
            0% { opacity: 1; transform: translateX(0) scale(1); max-height: 500px; margin-bottom: 3px; } 
            100% { opacity: 0; transform: translateX(100vw) scale(0.7); max-height: 0; margin-bottom: 0; padding-top: 0; padding-bottom: 0; } 
        }
        @keyframes slideOutLeft { 
            0% { opacity: 1; transform: translateX(0) scale(1); max-height: 500px; margin-bottom: 3px; } 
            100% { opacity: 0; transform: translateX(-100vw) scale(0.7); max-height: 0; margin-bottom: 0; padding-top: 0; padding-bottom: 0; } 
        }

        /* 1. 基础消息容器，取消默认动画 */
.msg { 
    display: flex; flex-direction: row; align-items: flex-end; max-width: 92%; position: relative; 
    margin-bottom: 3px; 
    transition: none; 
}

/* 2. 只有新消息才触发动画 */
.msg.new-anim {
    animation: slideUpIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
}

/* 3. 对勾样式（必须添加） */
/* 状态图标容器：紧贴时间戳 */
.status-icon {
    position: absolute;
    right: -2px; /* 调小距离，让它贴近时间 */
    bottom: -1;
    font-size: 10px; /* 稍微调小一点 */
    display: inline-flex;
    width: 12px;
    justify-content: center;
}

/* 统一修改已发送（双勾）：确保重叠生效且不产生偏移 */
/* 针对双对勾的细节微调 */
.status-sent::after {
    content: '✓✓' !important;
    color: #3498db !important;
    font-family: Arial, sans-serif !important;
    font-weight: 600 !important;
    letter-spacing: -7px !important;
    display: inline-block !important;
    
    /* 新增：消除行高干扰并向下位移 */
    line-height: 1 !important;
    transform: translateY(1px); 
    
    -webkit-font-smoothing: grayscale;
}

/* 针对单对勾的细节微调 */
.status-sending::after {
    content: '✓' !important;
    color: #999 !important;
    font-family: Arial, sans-serif !important;
    font-weight: 600 !important;
    display: inline-block !important;
    
    /* 新增：保持一致的位移 */
    line-height: 1 !important;
    transform: translateY(1px);
}






        .msg.deleting-out { animation: slideOutRight 0.6s cubic-bezier(0.4, 0, 0.2, 1) forwards !important; pointer-events: none; }
        .msg.deleting-in { animation: slideOutLeft 0.6s cubic-bezier(0.4, 0, 0.2, 1) forwards !important; pointer-events: none; }

        .msg-in { align-self: flex-start; }
        .msg-out { align-self: flex-end; flex-direction: row-reverse; }

        .checkbox { width: 0; height: 20px; border: 2px solid #ddd; border-radius: 50%; margin: 0; opacity: 0; transform: scale(0); transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); flex-shrink: 0; cursor: pointer; align-self: center; }
        .selecting .checkbox { width: 20px; margin: 0 12px; opacity: 1; transform: scale(1); }
        .msg.selected .checkbox { background: var(--select-blue); border-color: var(--select-blue); box-shadow: inset 0 0 0 3px #fff; }

        .msg-content-wrapper { 
            display: flex; flex-direction: column; max-width: 100%; position: relative; 
            will-change: transform; transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        }
        .msg-in .msg-content-wrapper { padding-left: 42px; }
        .msg-out .msg-content-wrapper { padding-right: 5px; align-items: flex-end; }

        .avatar { 
            width: 34px; height: 34px; border-radius: 50%; object-fit: cover; 
            position: absolute; left: 0; bottom: 0; 
            border: 1.5px solid rgba(255,255,255,0.6);
            display: flex; align-items: center; justify-content: center;
            color: #fff; font-weight: bold; font-size: 15px; text-transform: uppercase;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .hide-av .avatar, .msg-out .avatar { display: none; }

        .bubble { 
            padding: 9px 13px; border-radius: 18px; font-size: 15px; line-height: 1.5; 
            position: relative; box-shadow: 0 4px 15px rgba(26, 82, 118, 0.08); 
            user-select: none; min-width: 50px; 
            touch-action: pan-y !important; 
            -webkit-touch-callout: none !important;
            -webkit-user-select: none;
            backdrop-filter: blur(12px) saturate(160%); -webkit-backdrop-filter: blur(12px) saturate(160%);
            border: 1px solid rgba(255,255,255,0.4); transition: all 0.3s ease;
        }

        /* 贴纸特化样式：彻底去除周围背景和模糊 */
        .bubble.is-sticker {
            background: transparent !important; 
            border: none !important; 
            box-shadow: none !important;
            backdrop-filter: none !important; 
            -webkit-backdrop-filter: none !important; 
            padding: 0 !important;
        }
        .bubble.is-sticker .image-album {
            background: transparent !important;
            max-width: 160px;
        }
        .bubble.is-sticker .image-album img {
            background: transparent !important;
            box-shadow: none !important;
            border-radius: 8px;
        }
       /* 贴纸特化样式：修正胶囊背景长度 */
.bubble.is-sticker .msg-time {
    background: rgba(0, 0, 0, 0.4); /* 稍微加深一点透明度，看清楚边缘 */
    color: #fff !important; 
    /* 增加右侧 padding，22px 足以放下双对勾而不溢出 */
    padding: 2px 22px 2px 8px; 
    border-radius: 12px;
    right: 4px; /* 离贴纸边缘稍微留点缝隙更美观 */
    bottom: 4px; 
    margin: 0; 
    font-size: 10px;
    position: absolute;
    display: flex;
    align-items: center;
    white-space: nowrap;
}

/* 确保对勾在胶囊内部对齐 */
.bubble.is-sticker .status-icon {
    right: 6px;   /* 在胶囊内部的绝对位置 */
    bottom: 3px;  /* 垂直居中微调 */
    width: auto;  /* 贴纸模式下不需要固定宽度，随对勾长度变化 */
}




        .msg:hover .bubble:not(.is-sticker) { transform: translateY(-1px); box-shadow: 0 8px 25px rgba(26, 82, 118, 0.15); }

        .msg-in.tail .bubble { border-bottom-left-radius: 4px; }
        .msg-out.tail .bubble { border-bottom-right-radius: 4px; }
        
        .msg-in .bubble { background: var(--msg-in); }
        .msg-out .bubble { background: var(--msg-out); }

        .quote-content { background: rgba(0,0,0,0.05); border-left: 3px solid var(--accent); padding: 4px 8px; border-radius: 4px; font-size: 12px; color: #455a64; margin-bottom: 6px; cursor: pointer; display: block; max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; transition: background 0.2s; }
        .quote-content:hover { background: rgba(0,0,0,0.1); }
        
        /* 修改时间显示，为其内部绝对定位对勾腾出右侧空间 (约15px) */
/* 修改时间显示：收紧空位，防止拉长对话框 */
.msg-time {
    font-size: 10px;
    color: var(--time);
    float: right;
    margin: 8px -4px -3px 8px;
    position: relative;
    bottom: -1px;
    opacity: 0.8;
    /* 核心修改：减小预留宽度，让对勾紧贴时间 */
    padding-right: 12px; 
    display: inline-block;
    white-space: nowrap; /* 禁止换行 */
}

        .u-info { font-size: 12px; font-weight: 600; color: var(--p); display: block; margin-bottom: 4px; }

        .image-album { display: grid; gap: 4px; border-radius: 12px; overflow: hidden; margin-bottom: 4px; max-width: 240px; }
        .album-1 { grid-template-columns: 1fr; }
        .album-2 { grid-template-columns: 1fr 1fr; }
        .album-3 { grid-template-columns: 1fr 1fr; }
        .album-3 img:first-child { grid-row: span 2; }
        .album-4 { grid-template-columns: 1fr 1fr; }
        .image-album img { width: 100%; height: 100%; object-fit: cover; background: #eee; cursor: pointer; min-height: 100px; max-height: 260px; transition: transform 0.4s; -webkit-touch-callout: none !important;
            -webkit-user-select: none !important;
            image-rendering: -webkit-optimize-contrast; 
        }
        .image-album img:hover { transform: scale(1.05); }

        .bubble.has-img { padding: 4px 4px 22px 4px; }
        .bubble.has-img .text-body { padding: 4px 8px 0 8px; display: block; }
        .bubble.has-img .msg-time { position: absolute; right: 12px; bottom: 6px; margin: 0; }

        #img-pre-area { display: none; padding: 10px 15px; background: rgba(255,255,255,0.8); backdrop-filter: blur(10px); border-top: 1px solid rgba(0,0,0,0.05); overflow-x: auto; white-space: nowrap; gap: 10px; }
        .pre-item { display: inline-block; width: 60px; height: 60px; position: relative; border-radius: 12px; overflow: hidden; border: 1px solid #ddd; margin-right: 8px; vertical-align: top; animation: menuPop 0.3s forwards; }
        .pre-item img { width: 100%; height: 100%; object-fit: cover; }
        .pre-del { position: absolute; top: 2px; right: 2px; background: rgba(0,0,0,0.5); color: #fff; width: 18px; height: 18px; border-radius: 50%; font-size: 12px; text-align: center; line-height: 18px; cursor: pointer; }
        
        #upload-progress { height: 3px; background: var(--p); width: 0%; transition: width 0.3s; position: absolute; top: -3px; left: 0; box-shadow: 0 0 10px var(--p); }

        .upload-btn { width: 34px; height: 34px; border-radius: 50%; background: rgba(255,255,255,0.5); color: var(--p); border: none; font-size: 20px; font-weight: 300; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.3s; }
        .upload-btn:hover { background: #fff; transform: rotate(90deg); }

        #menu { 
            position: fixed; display: none; background: rgba(255,255,255,0.9); 
            backdrop-filter: blur(20px); border-radius: 16px; box-shadow: 0 15px 40px rgba(0,0,0,0.15); 
            z-index: 1000; animation: menuPop 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); 
            min-width: 130px; overflow: hidden; border: 1px solid rgba(255,255,255,0.4); 
        }
        .menu-item { padding: 14px 20px; font-size: 14px; color: #333; cursor: pointer; border-bottom: 0.5px solid rgba(0,0,0,0.05); transition: background 0.2s; }
        .menu-item.danger { color: #ff3b30; font-weight: 500; }
        .menu-item:hover { background: rgba(0,0,0,0.03); }
        
        #modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); display: none; z-index: 2000; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        .modal { background: #fff; width: 85%; max-width: 300px; border-radius: 24px; padding: 25px; animation: menuPop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.2); }
        .modal-btn { width: 100%; padding: 14px; border: none; background: #f5f5f7; border-radius: 14px; margin-top: 10px; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .modal-btn:active { transform: scale(0.96); }

        .footer { 
    position: relative; /* 改为相对定位 */
    width: 100%; 
    background: rgba(225, 245, 254, 0.8); 
    backdrop-filter: blur(30px); 
    -webkit-backdrop-filter: blur(30px); 
    z-index: 100; border-top: 1px solid rgba(255,255,255,0.3);
    display: flex;
    flex-direction: column;
    flex-shrink: 0; /* 防止底部被压缩 */
}


        /* 表情面板：修正滚动区域，确保最后一张图不被挡住 */
        #emoji-panel {
            height: 0; 
            overflow: hidden; 
            background: rgba(240, 247, 255, 0.95);
            transition: height 0.25s cubic-bezier(0.32, 1, 0.23, 1);
        }
        #emoji-panel.open { 
            height: 300px; 
            overflow-y: auto; 
            padding: 15px 15px calc(60px + env(safe-area-inset-bottom)); /* 重点：增加底部填充 */
        }
        .emoji-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
        .emoji-item { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.5); border-radius: 12px; cursor: pointer; position: relative; transition: 0.2s; }
        .emoji-item:active { transform: scale(0.9); background: #fff; }
        .emoji-item img { max-width: 85%; max-height: 85%; object-fit: contain; }
        .add-emoji-btn { border: 2px dashed #ccc; color: #999; font-size: 24px; }

        #edit-preview, #quote-preview { display: none; padding: 10px 15px; background: rgba(255,255,255,0.5); border-left: 4px solid var(--accent); border-bottom: 1px solid rgba(0,0,0,0.03); position: relative; animation: slideUpIn 0.3s; }
        #edit-preview { border-left-color: var(--select-blue); }
        .cancel-btn { position:absolute; right:15px; top:12px; color:#999; cursor:pointer; font-size: 18px; }
        
        .input-area { padding: 10px 15px calc(12px + env(safe-area-inset-bottom)); display: flex; gap: 10px; align-items: center; position: relative; }
        /* 面板打开时，输入区域的底部 padding 还原，由面板接管底部空间 */
        #emoji-panel.open ~ .input-area { padding-bottom: 12px; }

        #multi-bar { position: absolute; inset: 0; background: #fff; display: none; align-items: center; justify-content: space-between; padding: 0 20px; z-index: 2; animation: slideUpIn 0.3s; }
        .multi-btn { color: var(--p); font-weight: bold; cursor: pointer; font-size: 16px; padding: 10px; }

        input#ipt { 
            flex: 1; background: rgba(255, 255, 255, 0.6); border-radius: 20px; 
            padding: 10px 16px; border: 1px solid rgba(255,255,255,0.8); outline: none; 
            font-size: 16px; transition: all 0.3s;
        }
        input#ipt:focus { background: #fff; box-shadow: 0 4px 15px rgba(26, 82, 118, 0.1); }
        
        #mask { position: fixed; inset: 0; background: rgba(0,0,0,0.3); display: none; z-index: 99; backdrop-filter: blur(4px); opacity: 0; transition: opacity 0.4s ease; }
        #mask.show { display: block; opacity: 1; }
        #side { 
            position: fixed; top: 0; width: 80%; max-width: 280px; height: 100%; 
            background: rgba(255,255,255,0.9); backdrop-filter: blur(30px); 
            z-index: 101; padding: 50px 25px; box-sizing: border-box; 
            border-right: 1px solid rgba(255,255,255,0.3);
            transform: translateX(-100%);
            transition: transform 0.5s cubic-bezier(0.32, 1, 0.23, 1);
            will-change: transform;
            left: 0;
        }
        #side.open { transform: translateX(0); box-shadow: 20px 0 60px rgba(0,0,0,0.1); }
        
        .s-input { width: 100%; border: 1px solid #eee; background: #fafafa; padding: 12px; border-radius: 12px; box-sizing: border-box; margin-top: 10px; outline: none; transition: 0.3s; }
        .s-input:focus { border-color: var(--p); background: #fff; }

        .av-setup-area { text-align: center; margin-bottom: 25px; }
        #setup-av-preview { 
            width: 85px; height: 85px; border-radius: 50%; background: #eee center/cover; 
            margin: 0 auto; cursor: pointer; border: 3px solid #fff; box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            position: relative; transition: 0.3s; overflow: hidden;
            display: flex; align-items: center; justify-content: center; color: #fff; font-size: 30px; font-weight: bold;
        }
        #setup-av-preview:hover { transform: scale(1.05); }

        .highlight-msg .bubble { animation: highlight-pulse 2s; }
        @keyframes highlight-pulse {
            0% { box-shadow: 0 0 0 0px var(--select-blue); }
            50% { box-shadow: 0 0 20px 5px var(--select-blue); }
            100% { box-shadow: 0 0 0 0px transparent; }
        }

        #img-viewer { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 3000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        #viewer-img { max-width: 95%; max-height: 95%; object-fit: contain; box-shadow: 0 0 30px rgba(0,0,0,0.5); border-radius: 8px; animation: menuPop 0.3s ease; }
        /* 状态图标容器 */
.status-icon {
    font-size: 11px;
    margin-left: 4px;
    vertical-align: middle;
    display: inline-flex;
    transition: all 0.2s;
}

/* 预上传：单个灰色对勾 */
.status-sending::after {
    content: '✓';
    color: #999;
}

/* 上传成功：双个蓝色对勾 */
.status-sent::after {
    content: '✓✓';
    color: #3498db; /* Telegram 经典的蓝色 */
    font-weight: bold;
}

/* 微调时间显示，给对勾留位置 */
.msg-time {
    display: flex;
    align-items: center;
    gap: 2px;
}
/* 贴纸长按反馈 */
.sticker-item {
    transition: all 0.2s;
    cursor: pointer;
}
.sticker-item:active {
    transform: scale(0.9);
    opacity: 0.7;
}

/* 菜单红色警示 */
.menu-item.danger {
    color: #ff3b30 !important;
}

/* 贴纸/图片专用对齐容器 */
.msg-time-ref {
    font-size: 11px;
    color: rgba(0, 0, 0, 0.3)!important;
    margin-top: 5px;
    display: flex;
    align-items: center;
    gap: 4px;
    line-height: 1;
    /* 确保时间戳不会缩成一团 */
    white-space: nowrap; 
}

/* 自己发的消息：强制贴纸容器内的内容靠右 */
.msg.out .content-div {
    display: flex;
    flex-direction: column;
    align-items: flex-end; /* 强制图片和时间戳都靠右对齐 */
}

/* 别人发的消息：强制靠左 */
.msg.in .content-div {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
}

/* 修正贴纸图片：确保它不会被 flex 挤压变形 */
.sticker-img {
    max-width: 180px;
    max-height: 180px;
    border-radius: 12px;
    display: block;
    object-fit: contain;
}

    </style>
</head>
<body onclick="hideMenu()">

<div id="img-viewer" onclick="this.style.display='none'">
    <img id="viewer-img" src="">
</div>

<div id="menu">
    <div class="menu-item danger" id="m-del-sticker" onclick="handleStickerDelete()" style="display:none; font-weight:bold;">删除贴纸</div>
    
    <div class="menu-item" id="m-replace" onclick="handleMenu('replace')" style="color:var(--select-blue); font-weight:bold;">替换图片</div>

// --- 辅助函数：核心压缩引擎 ---
function compressImage(file, maxWidth, quality) {
    return new Promise((resolve) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = (e) => {
            const img = new Image();
            img.src = e.target.result;
            img.onload = () => {
                const canvas = document.createElement('canvas');
                let width = img.width;
                let height = img.height;

                if (width > maxWidth) {
                    height = (maxWidth / width) * height;
                    width = maxWidth;
                }

                canvas.width = width;
                canvas.height = height;
                const ctx = canvas.getContext('2d');
                
                // 【关键：清除画布，确保背景透明】
                ctx.clearRect(0, 0, width, height); 
                ctx.drawImage(img, 0, 0, width, height);

                // 【核心修改：使用 image/png 以保留透明度】
                // 注意：PNG 的质量参数不是 0-1 的小数，所以这里直接导出即可
                canvas.toBlob((blob) => {
                    resolve(blob);
                }, 'image/png'); // 必须改为 png
            };
        };
    });
}

    function fileToBase64(file) { return new Promise((resolve) => { const reader = new FileReader(); reader.onload = (e) => resolve(e.target.result); reader.readAsDataURL(file); }); }

    function compressImg(file) {
        return new Promise((resolve) => {
            const reader = new FileReader(); reader.readAsDataURL(file);
            reader.onload = (e) => {
                const img = new Image(); img.src = e.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    let width = img.width, height = img.height;
                    const max = 1200; 
                    if (width > height && width > max) { height *= max / width; width = max; }
                    else if (height > max) { width *= max / height; height = max; }
                    canvas.width = width; canvas.height = height;
                    const ctx = canvas.getContext('2d'); ctx.imageSmoothingEnabled = true;
                    ctx.imageSmoothingQuality = 'high';
                    ctx.drawImage(img, 0, 0, width, height);
                    resolve(canvas.toDataURL('image/jpeg', 0.95));
                };
            };
        });
    }

    function bindSuperGestures(el, m) {
        el.addEventListener('pointerdown', (e) => {
            if(isMultiMode) return;
            activeMsg = m;
            startX = e.clientX;
            startY = e.clientY;
            swipeTriggered = false;

                if (window.navigator.vibrate) window.navigator.vibrate(40);
                showMenuAt(startX, startY);
                longPressTimer = null;
            }, 400);
        });

        el.addEventListener('pointermove', (e) => {
            if (isMultiMode || !activeMsg) return;
            const currentX = e.clientX;
            const currentY = e.clientY;
            const diffX = startX - currentX;
            const diffY = Math.abs(currentY - startY);
            if (diffY > 15 && !swipeTriggered) { clearTimeout(longPressTimer); return; }
            if (Math.abs(diffX) > 5) clearTimeout(longPressTimer);
            if (diffX > 5) {
                const wrapper = el.closest('.msg-content-wrapper');
                const moveX = Math.pow(Math.min(diffX, 150), 0.85);
                wrapper.style.transform = `translateX(-${moveX}px)`;
                wrapper.style.transition = 'none';
                if (diffX > 33 && !swipeTriggered) {
                    swipeTriggered = true;
                    if (window.navigator.vibrate) window.navigator.vibrate(15);
                    el.style.filter = 'brightness(1.1)';
                } else if (diffX <= 55 && swipeTriggered) {
                    swipeTriggered = false;
                    el.style.filter = 'none';
                }
            }
        });

        el.addEventListener('pointerup', (e) => {
            clearTimeout(longPressTimer);
            const wrapper = el.closest('.msg-content-wrapper');
            if (wrapper) {
                wrapper.style.transition = 'transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
                wrapper.style.transform = 'translateX(0)';
            }
            el.style.filter = 'none';
            if (swipeTriggered) { handleMenu('quote'); swipeTriggered = false; }
        });

        el.addEventListener('pointercancel', () => {
            clearTimeout(longPressTimer);
            const wrapper = el.closest('.msg-content-wrapper');
            if (wrapper) wrapper.style.transform = 'translateX(0)';
        });
    }

 function renderMsg(m, isHistory = false) {

        const temps = document.querySelectorAll('[id^="msg-temp-"]');
        for (let tempEl of temps) {
            // 匹配逻辑：如果内容相同，且图片张数/第一张图相同，则认为是同一条
            const tempImg = tempEl.querySelector('.image-album img')?.src;
            const officialImg = m.images && m.images[0];
            
            if (tempImg === officialImg || (m.content && tempEl.innerText.includes(m.content))) {
                // 升级临时气泡为正式气泡
                tempEl.id = `msg-${m.id}`;
                const icon = tempEl.querySelector('.status-icon');
                if (icon) icon.className = 'status-icon status-sent'; // 变蓝勾
                return; // 关键：直接返回，不要再画一遍
            }
        }
    }
    
    
    if(document.getElementById(`msg-${m.id}`)) return;
    
    const chatBox = document.getElementById('chat');
    const isMe = currentUser && m.unique_id === currentUser.id;
    const timeStr = new Date(m.created_at || Date.now()).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
    const isAtBottom = chatBox.scrollHeight - chatBox.scrollTop - chatBox.clientHeight < 100;

    if (lastMsgInfo.id === m.unique_id && lastMsgInfo.dom) {
        lastMsgInfo.dom.classList.add('hide-av');
        lastMsgInfo.dom.classList.remove('tail');
    }
    const isFirstInGroup = (m.unique_id !== lastSenderId);
    lastSenderId = m.unique_id;

    const div = document.createElement('div');
    // 只给非历史消息（新消息）加 new-anim 动画类
    div.className = `msg ${isMe ? 'msg-out' : 'msg-in'} tail ${isHistory ? '' : 'new-anim'}`;
    div.id = `msg-${m.id}`;
    
    if (isHistory) { div.style.opacity = '1'; }
    div.onclick = () => { if(isMultiMode) toggleSelect(m.id); };

    const isSticker = m.is_sticker || m.content === "[贴纸]";
    const stickerClass = isSticker ? 'is-sticker' : '';
    let albumHTML = (m.images && m.images.length > 0) ? `<div class="image-album album-${Math.min(m.images.length, 4)}">${m.images.map(src => `<img src="${src}" oncontextmenu="return false;" draggable="false" onclick="event.stopPropagation(); viewImage('${src}')">`).join('')}</div>` : '';

    let avatarHTML = '';
    if(m.avatar_url && !m.avatar_url.includes('api.dicebear.com')) {
        avatarHTML = `<img class="avatar" src="${m.avatar_url}">`;
    } else {
        const color = getMsgColor(m.unique_id || m.username);
        avatarHTML = `<div class="avatar" style="background-color:${color}">${getFirstChar(m.username)}</div>`;
    }

    // 渲染对勾：预显示用 status-sending(单勾)，正式用 status-sent(双勾)
    let statusIconHTML = '';
    if(isMe) {
        const statusClass = m.isOptimistic ? 'status-sending' : 'status-sent';
        statusIconHTML = `<span class="status-icon ${statusClass}"></span>`;
    }

    div.innerHTML = `
        <div class="checkbox"></div>
        <div class="msg-content-wrapper">
            ${avatarHTML}
            <div class="bubble ${albumHTML ? 'has-img' : ''} ${stickerClass}">
                ${(isFirstInGroup && !isMe && !isSticker) ? `<span class="u-info">${m.username}</span>` : ''}
                ${m.quote_text ? `<div class="quote-content" onclick="scrollToMsg('${m.quote_id}')"><b>${m.quote_user}:</b> ${m.quote_text}</div>` : ''}
                ${albumHTML}
                ${(m.content && !isSticker) ? `<span class="text-body">${m.content}</span>` : ''}
                <span class="msg-time">${timeStr}${statusIconHTML}</span>
            </div>
        </div>`;
    
    chatBox.appendChild(div);
    bindSuperGestures(div.querySelector('.bubble'), m);
    lastMsgInfo = { id: m.unique_id, dom: div };

    if(!isHistory) { 
        if (isMe || isAtBottom) { scrollToBottom(true); } else { showUnreadBadge(); } 
        ChatStorage.save('chat'); 
    }
}



    function showMenuAt(x, y) {
        const menu = document.getElementById('menu'); const isMe = activeMsg.unique_id === currentUser.id;
        const hasImg = activeMsg.images && activeMsg.images.length > 0;
        document.getElementById('m-edit').style.display = (isMe && activeMsg.content && activeMsg.content!=="[贴纸]") ? 'block' : 'none'; 
        document.getElementById('m-replace').style.display = (isMe && hasImg && !activeMsg.is_sticker) ? 'block' : 'none'; 
        const unsendBtn = document.getElementById('m-unsend');
        unsendBtn.innerText = isMe ? '撤回' : '删除';
        unsendBtn.classList.add('danger'); 
        
        menu.style.display = 'block';
        const menuWidth = 130, menuHeight = isMe ? 180 : 130; 
        let finalX = (x > window.innerWidth / 2) ? x - menuWidth - 20 : x + 20;
        let finalY = (y > window.innerHeight / 2) ? y - menuHeight - 20 : y + 20;
        menu.style.left = `${Math.max(10, Math.min(finalX, window.innerWidth - menuWidth - 10))}px`;
        menu.style.top = `${Math.max(60, Math.min(finalY, window.innerHeight - menuHeight - 80))}px`;
    }

    function hideMenu() { document.getElementById('menu').style.display = 'none'; }

    function handleMenu(type) {
        if (type === 'edit') { 
            editingId = activeMsg.id; 
            const ipt = document.getElementById('ipt'); 
            ipt.value = activeMsg.content; 
            document.getElementById('ep-text').innerText = activeMsg.content;
            document.getElementById('edit-preview').style.display = 'block';
            cancelQuote(); ipt.focus(); 
        } 
        else if (type === 'replace') {
            const replacer = document.createElement('input');
            replacer.type = 'file'; replacer.accept = 'image/*';
            replacer.onchange = async (e) => {
                if(e.target.files && e.target.files[0]) {
                    const base64 = await compressImg(e.target.files[0]);
                    try {
                        await sb.from('messages').update({ images: [base64] }).eq('id', activeMsg.id);
                    } catch(err) { alert("替换失败"); }
                }
            };
            replacer.click();
        }
        else if (type === 'multi') { enterMultiMode(); } 
        else if (type === 'quote') {
            quoteData = { id: activeMsg.id, user: activeMsg.username, text: activeMsg.content || "[图片]" };
            document.getElementById('qp-user').innerText = quoteData.user; 
            document.getElementById('qp-text').innerText = quoteData.text;
            document.getElementById('quote-preview').style.display = 'block'; 
            cancelEdit(); document.getElementById('ipt').focus();
        }
        else if (type === 'unsend') { document.getElementById('modal-title').innerText = (activeMsg.unique_id === currentUser.id) ? "撤回消息" : "删除消息"; document.getElementById('modal-overlay').style.display = 'flex'; }
        hideMenu();
    }

    function handleMultiAction() {
        if(selectedSet.size === 0) return;
        const actionType = document.getElementById('multi-action').innerText;
        document.getElementById('modal-title').innerText = actionType + "选中的消息";
        document.getElementById('modal-overlay').style.display = 'flex';
    }

    async function confirmAction() {
        closeModal();
        const targets = isMultiMode ? Array.from(selectedSet) : (activeMsg ? [activeMsg.id] : []);
        if (targets.length === 0) return;
        const isDeleteAction = document.getElementById('modal-title').innerText.includes("删除");
        targets.forEach(id => {
            const el = document.getElementById(`msg-${id}`);
            if(el) { 
                el.style.maxHeight = el.offsetHeight + "px"; 
                el.classList.add(el.classList.contains('msg-out') ? 'deleting-out' : 'deleting-in'); 
            }
        });
        setTimeout(() => { if(isMultiMode) cancelMulti(); }, 300); 
        setTimeout(async () => {
            for(let id of targets) {
                try {
                    if(!isDeleteAction) await sb.from('messages').delete().eq('id', id);
                    const el = document.getElementById(`msg-${id}`);
                    if(el) { if (lastMsgInfo.dom === el) lastMsgInfo = { id: null, dom: null }; el.remove(); }
                } catch(e) {}
            }
            ChatStorage.save('chat'); 
        }, 600);
    }

    function scrollToBottom(smooth = false) { const chatBox = document.getElementById('chat'); chatBox.scrollTo({ top: chatBox.scrollHeight, behavior: smooth ? 'smooth' : 'auto' }); hideUnreadBadge(); }
    function showUnreadBadge() { unreadCount++; const badge = document.getElementById('unread-badge'); badge.innerText = `${unreadCount} 条新消息`; badge.classList.add('show'); }
    function hideUnreadBadge() { unreadCount = 0; document.getElementById('unread-badge').classList.remove('show'); }
    function cancelQuote() { quoteData = null; document.getElementById('quote-preview').style.display = 'none'; }
    function cancelEdit() { editingId = null; document.getElementById('ipt').value = ''; document.getElementById('edit-preview').style.display = 'none'; }

    function scrollToMsg(id) { 
        const el = document.getElementById(`msg-${id}`); 
        if(el) {
            el.scrollIntoView({ behavior: 'smooth', block: 'center' });
            el.classList.remove('highlight-msg');
            void el.offsetWidth; 
            el.classList.add('highlight-msg');
            setTimeout(() => el.classList.remove('highlight-msg'), 2000);
        }
    }

    function enterMultiMode() { isMultiMode = true; cancelQuote(); cancelEdit(); document.getElementById('chat').classList.add('selecting'); document.getElementById('multi-bar').style.display = 'flex'; toggleSelect(activeMsg.id); }
    function cancelMulti() { isMultiMode = false; document.getElementById('chat').classList.remove('selecting'); document.getElementById('multi-bar').style.display = 'none'; document.querySelectorAll('.msg.selected').forEach(el => el.classList.remove('selected')); selectedSet.clear(); }
    
    function toggleSelect(id) { 
        const el = document.getElementById(`msg-${id}`); 
        if(!el) return;
        if(selectedSet.has(id)) { selectedSet.delete(id); el.classList.remove('selected'); } 
        else { selectedSet.add(id); el.classList.add('selected'); } 
        updateMultiUI(); 
    }

    function updateMultiUI() {
        document.getElementById('multi-count').innerText = `已选 ${selectedSet.size} 项`;
        let hasOther = false; 
        selectedSet.forEach(id => { 
            const mDom = document.getElementById(`msg-${id}`); 
            if(mDom && mDom.classList && !mDom.classList.contains('msg-out')) hasOther = true; 
        });
        document.getElementById('multi-action').innerText = hasOther ? "删除" : "撤回";
    }

    function closeModal() { document.getElementById('modal-overlay').style.display = 'none'; }
    function toggleUI(s) { 
        const side = document.getElementById('side'), mask = document.getElementById('mask');
        if(s) { mask.style.display = 'block'; requestAnimationFrame(() => { mask.classList.add('show'); side.classList.add('open'); }); } 
        else { side.classList.remove('open'); mask.classList.remove('show'); setTimeout(() => { if(!side.classList.contains('open')) mask.style.display = 'none'; }, 500); }
    }
    async function saveData() {
    const n = document.getElementById('p-n').value.trim();
    const i = document.getElementById('p-i').value.trim();
    if (!n || !i) {
        alert("请填写昵称和ID");
        return;
    }

    // --- 核心修改：先尝试从云端同步 ---
    const isOldUser = await syncUserProfile(i);

    if (isOldUser) {
        // 如果是老用户，syncUserProfile 已经处理了数据覆盖
        toggleUI(0);
        location.reload(); // 刷新以应用数据
    } else {
        // 如果是新用户，才执行初次上传
        currentUser = { name: n, id: i, av: tempAvatarBase64 || '' };
        
        const { error } = await sb.from('user_profiles').upsert({
            unique_id: i,
            username: n,
            avatar_url: tempAvatarBase64,
            stickers: [] 
        });

        if (error) {
            alert("保存至云端失败: " + error.message);
        } else {
            localStorage.setItem('chat_v12', JSON.stringify(currentUser));
            localStorage.setItem('my_stickers_v1', JSON.stringify([]));
            location.reload();
        }
    }
}


async function syncUserProfile(id) {
    const { data, error } = await sb.from('user_profiles').select('*').eq('unique_id', id).single();
    if (data) {
        // 1. 更新全局变量
        currentUser = { name: data.username, id: data.unique_id, av: data.avatar_url };
        stickerList = data.stickers || [];
        
        // 2. 更新本地缓存
        localStorage.setItem('chat_v12', JSON.stringify(currentUser));
        localStorage.setItem('my_stickers_v1', JSON.stringify(stickerList));
        
        // 3. 立即刷新头像显示
        updateAvDisplay(document.getElementById('h-av'), currentUser.av, currentUser.name, currentUser.id);
        
        // 4. 立即刷新贴纸面板
        renderStickers(); 
        
        enableChat();
        return true;
    }
    return false;
}


    
    let activeSticker = null; // 记录当前选中的贴纸

// 1. 加载贴纸函数
async function loadStickers() {
    // 找到你的贴纸容器（确保 ID 叫 sticker-container）
    const container = document.getElementById('sticker-container');
    if (!container) return;

    // 从数据库获取贴纸
    const { data, error } = await sb.from('stickers').select('*').order('created_at', { ascending: false });
    if (error) return;

    container.innerHTML = ''; // 清空旧的
    data.forEach(s => {
        const img = document.createElement('img');
        img.src = s.url;
        img.className = 'sticker-item';
        
        // 点击发送
        img.onclick = () => sendSticker(s.url);
        
        // 绑定长按删除手势
        bindStickerGestures(img, s);
        
        container.appendChild(img);
    });
}

// 2. 绑定长按手势逻辑
function bindStickerGestures(el, s) {
    let timer;
    el.addEventListener('pointerdown', (e) => {
        timer = setTimeout(() => {
            if (navigator.vibrate) navigator.vibrate(50); // 震动反馈
            activeSticker = s; // 标记这张贴纸
            showStickerContextMenu(e);
        }, 600);
    });
    el.addEventListener('pointerup', () => clearTimeout(timer));
    el.addEventListener('pointerleave', () => clearTimeout(timer));
}

// 3. 显示菜单（复用你现有的 context-menu 样式）
function showStickerContextMenu(e) {
    e.preventDefault();
    const menu = document.getElementById('context-menu');
    if (!menu) return;

    // 填充删除选项
    menu.innerHTML = `
        <div class="menu-item danger" style="color:#ff3b30; font-weight:bold;" onclick="executeDeleteSticker()">
            <i class="fas fa-trash"></i> 删除贴纸
        </div>
    `;

    menu.style.display = 'block';
    
    // 计算位置，防止菜单飞出屏幕
    let x = e.pageX;
    let y = e.pageY;
    if (x + 150 > window.innerWidth) x -= 150;
    if (y + 50 > window.innerHeight) y -= 50;

    menu.style.left = x + 'px';
    menu.style.top = y + 'px';

    // 点击其他地方关闭
    const hide = () => { menu.style.display = 'none'; document.removeEventListener('click', hide); };
    setTimeout(() => document.addEventListener('click', hide), 10);
}

// 4. 执行真正的删除动作
async function executeDeleteSticker() {
    if (!activeSticker) return;
    if (confirm("确定要删除这张贴纸吗？")) {
        const { error } = await sb.from('stickers').delete().eq('id', activeSticker.id);
        if (error) {
            alert("删除失败");
        } else {
            loadStickers(); // 刷新列表
        }
    }
}


function showStickerMenu(e) {
    const menu = document.getElementById('menu');
    
    // 1. 隐藏所有普通聊天菜单项，只显示删除贴纸项
    const items = menu.querySelectorAll('.menu-item');
    items.forEach(item => item.style.display = 'none');
    document.getElementById('m-del-sticker').style.display = 'block';

    // 2. 显示菜单
    menu.style.display = 'block';

    // 3. 计算位置（防止超出屏幕边界）
    let x = e.clientX;
    let y = e.clientY;
    const menuWidth = 130;
    const menuHeight = 50;

    let finalX = (x > window.innerWidth / 2) ? x - menuWidth : x;
    let finalY = y - menuHeight - 10; // 在手指上方一点显示

    menu.style.left = `${Math.max(10, Math.min(finalX, window.innerWidth - menuWidth - 10))}px`;
    menu.style.top = `${Math.max(60, Math.min(finalY, window.innerHeight - 100))}px`;
}

// 核心修改：确保这里加了 async
async function handleStickerDelete() {
    if (!targetStickerUrl) return;
    
    // 1. 本地过滤
    stickerList = stickerList.filter(u => u !== targetStickerUrl);
    localStorage.setItem('my_stickers_v1', JSON.stringify(stickerList));
    
    // 2. 界面更新
    renderStickers(); 
    hideMenu(); 

    if (window.navigator.vibrate) window.navigator.vibrate(20);

    // 3. 同步到云端
    await sb.from('user_profiles')
            .update({ stickers: stickerList })
            .eq('unique_id', currentUser.id);
}

function enableChat() {
    const ipt = document.getElementById('ipt');
    if (ipt) ipt.disabled = false;
}

</script>
