<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>聊天室</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --p: #1a5276;
            --bg: #e1f5fe;
            --msg-in: linear-gradient(135deg, rgba(235,245,251,0.8) 0%, rgba(214,234,248,0.8) 100%);
            --msg-out: linear-gradient(135deg, rgba(232,245,233,0.9) 0%, rgba(200,230,201,0.9) 100%);
            --time: #546e7a;
            --accent: #ffb3c1;
            --select-blue: #5dade2;
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: -apple-system, "SF Pro Text", sans-serif;
            background: linear-gradient(-45deg, #f0f7ff, #e1f5fe, #e3f2fd, #f5f9ff);
            background-size: 400% 400%;
            animation: gradientBG 18s ease-in-out infinite;
            display: flex; flex-direction: column;
            overflow: hidden; -webkit-tap-highlight-color: transparent; position: fixed;
        }

        @keyframes gradientBG {
            0%   { background-position: 0% 50%; }
            50%  { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .header {
            padding-top: env(safe-area-inset-top);
            background: rgba(225,245,254,0.4);
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border-bottom: 1px solid rgba(255,255,255,0.3);
            z-index: 10; flex-shrink: 0;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
        }
        .header-inner { height: 44px; display: flex; align-items: center; padding: 0 15px; }

        .av-btn {
            width: 36px; height: 36px; border-radius: 12px; background: #eee center/cover;
            cursor: pointer; border: 1px solid rgba(255,255,255,0.4);
            transition: transform 0.3s cubic-bezier(0.175,0.885,0.32,1.275);
            display: flex; align-items: center; justify-content: center;
            color: #fff; font-weight: bold; overflow: hidden;
        }
        .av-btn:active { transform: scale(0.9); }

        #chat {
            flex: 1; flex-basis: 0; overflow-y: auto;
            padding: 15px; padding-bottom: 10px;
            display: flex; flex-direction: column;
            position: relative; z-index: 2;
            background: transparent !important;
            will-change: transform; -webkit-overflow-scrolling: touch;
            opacity: 1;
        }
        #chat::-webkit-scrollbar { width: 4px; }
        #chat::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 10px; }

        #unread-badge {
            position: fixed; bottom: 85px; left: 50%; transform: translateX(-50%);
            background: var(--p); color: white; padding: 8px 16px; border-radius: 20px;
            font-size: 13px; font-weight: 600; display: none; z-index: 90;
            transition: opacity 0.3s, transform 0.3s;
        }
        #unread-badge.show { display: block; opacity: 1; transform: translateX(-50%) translateY(0); }

        @keyframes slideUpIn {
            from { opacity: 0; transform: translateY(15px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes menuPop {
            from { opacity: 0; transform: scale(0.95); }
            to   { opacity: 1; transform: scale(1); }
        }
        @keyframes slideOutRight {
            from { opacity: 1; transform: translateX(0) scale(1); max-height: 500px; margin-bottom: 3px; }
            to   { opacity: 0; transform: translateX(100vw) scale(0.7); max-height: 0; margin-bottom: 0; padding-top: 0; padding-bottom: 0; }
        }
        @keyframes slideOutLeft {
            from { opacity: 1; transform: translateX(0) scale(1); max-height: 500px; margin-bottom: 3px; }
            to   { opacity: 0; transform: translateX(-100vw) scale(0.7); max-height: 0; margin-bottom: 0; padding-top: 0; padding-bottom: 0; }
        }

        .msg {
            display: flex; flex-direction: row; align-items: flex-end;
            max-width: 92%; position: relative; margin-bottom: 3px; transition: none;
        }
        .msg.new-anim { animation: slideUpIn 0.5s cubic-bezier(0.16,1,0.3,1) forwards; }
        .msg.deleting-out { animation: slideOutRight 0.6s cubic-bezier(0.4,0,0.2,1) forwards !important; pointer-events: none; }
        .msg.deleting-in  { animation: slideOutLeft  0.6s cubic-bezier(0.4,0,0.2,1) forwards !important; pointer-events: none; }

        .msg-in  { align-self: flex-start; }
        .msg-out { align-self: flex-end; flex-direction: row-reverse; }

        .status-icon {
            position: absolute; right: -2px; bottom: -1px;
            font-size: 10px; display: inline-flex; width: 12px; justify-content: center;
        }
        .status-sent::after {
            content: '✓✓'; color: #3498db; font-family: Arial, sans-serif;
            font-weight: 600; letter-spacing: -7px;
            display: inline-block; line-height: 1; transform: translateY(1px);
            -webkit-font-smoothing: grayscale;
        }
        .status-sending::after {
            content: '✓'; color: #999; font-family: Arial, sans-serif;
            font-weight: 600; display: inline-block; line-height: 1; transform: translateY(1px);
        }

        .checkbox {
            width: 0; height: 20px; border: 2px solid #ddd; border-radius: 50%;
            margin: 0; opacity: 0; transform: scale(0);
            transition: all 0.4s cubic-bezier(0.34,1.56,0.64,1);
            flex-shrink: 0; cursor: pointer; align-self: center;
        }
        .selecting .checkbox { width: 20px; margin: 0 12px; opacity: 1; transform: scale(1); }
        .msg.selected .checkbox { background: var(--select-blue); border-color: var(--select-blue); box-shadow: inset 0 0 0 3px #fff; }

        .msg-content-wrapper {
            display: flex; flex-direction: column; max-width: 100%; position: relative;
            will-change: transform;
            transition: transform 0.4s cubic-bezier(0.175,0.885,0.32,1.275);
        }
        .msg-in  .msg-content-wrapper { padding-left: 42px; }
        .msg-out .msg-content-wrapper { padding-right: 5px; align-items: flex-end; }

        .avatar {
            width: 34px; height: 34px; border-radius: 50%; object-fit: cover;
            position: absolute; left: 0; bottom: 0;
            border: 1.5px solid rgba(255,255,255,0.6);
            display: flex; align-items: center; justify-content: center;
            color: #fff; font-weight: bold; font-size: 15px; text-transform: uppercase;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .hide-av .avatar, .msg-out .avatar { display: none; }

        .bubble {
            padding: 9px 13px; border-radius: 18px; font-size: 15px; line-height: 1.5;
            position: relative; box-shadow: 0 4px 15px rgba(26,82,118,0.08);
            user-select: none; min-width: 50px;
            touch-action: pan-y !important;
            -webkit-touch-callout: none !important; -webkit-user-select: none;
            backdrop-filter: blur(12px) saturate(160%); -webkit-backdrop-filter: blur(12px) saturate(160%);
            border: 1px solid rgba(255,255,255,0.4); transition: all 0.3s ease;
        }
        .msg:hover .bubble:not(.is-sticker) { transform: translateY(-1px); box-shadow: 0 8px 25px rgba(26,82,118,0.15); }
        .msg-in.tail  .bubble { border-bottom-left-radius: 4px; }
        .msg-out.tail .bubble { border-bottom-right-radius: 4px; }
        .msg-in  .bubble { background: var(--msg-in); }
        .msg-out .bubble { background: var(--msg-out); }

        .bubble.is-sticker {
            background: transparent !important; border: none !important;
            box-shadow: none !important; backdrop-filter: none !important;
            -webkit-backdrop-filter: none !important; padding: 0 !important;
        }
        .bubble.is-sticker .image-album { background: transparent !important; max-width: 160px; }
        .bubble.is-sticker .image-album img { background: transparent !important; box-shadow: none !important; border-radius: 8px; }
        .bubble.is-sticker .msg-time {
            background: rgba(0,0,0,0.4); color: #fff !important;
            padding: 2px 22px 2px 8px; border-radius: 12px;
            right: 4px; bottom: 4px; margin: 0; font-size: 10px;
            position: absolute; display: flex; align-items: center; white-space: nowrap;
        }
        .bubble.is-sticker .status-icon { right: 6px; bottom: 3px; width: auto; }

        .msg-time {
            font-size: 10px; color: var(--time); float: right;
            margin: 8px -4px -3px 8px; position: relative; bottom: -1px;
            opacity: 0.8; padding-right: 12px;
            display: inline-block; white-space: nowrap;
        }
        .u-info { font-size: 12px; font-weight: 600; color: var(--p); display: block; margin-bottom: 4px; }

        .image-album { display: grid; gap: 4px; border-radius: 12px; overflow: hidden; margin-bottom: 4px; max-width: 240px; }
        .album-1 { grid-template-columns: 1fr; }
        .album-2 { grid-template-columns: 1fr 1fr; }
        .album-3 { grid-template-columns: 1fr 1fr; }
        .album-3 img:first-child { grid-row: span 2; }
        .album-4 { grid-template-columns: 1fr 1fr; }
        .image-album img {
            width: 100%; height: 100%; object-fit: cover; background: #eee;
            cursor: pointer; min-height: 100px; max-height: 260px;
            transition: transform 0.4s;
            -webkit-touch-callout: none !important; -webkit-user-select: none !important;
            image-rendering: -webkit-optimize-contrast;
        }
        .image-album img:hover { transform: scale(1.05); }

        .bubble.has-img { padding: 4px 4px 22px 4px; }
        .bubble.has-img .text-body { padding: 4px 8px 0 8px; display: block; }
        .bubble.has-img .msg-time { position: absolute; right: 12px; bottom: 6px; margin: 0; }

        /* 贴纸对齐 */
        .msg.out .content-div { display: flex; flex-direction: column; align-items: flex-end; }
        .msg.in  .content-div { display: flex; flex-direction: column; align-items: flex-start; }
        .sticker-img { max-width: 180px; max-height: 180px; border-radius: 12px; display: block; object-fit: contain; }

        #img-pre-area {
            display: none; padding: 10px 15px;
            background: rgba(255,255,255,0.8); backdrop-filter: blur(10px);
            border-top: 1px solid rgba(0,0,0,0.05);
            overflow-x: auto; white-space: nowrap; gap: 10px;
        }
        .pre-item {
            display: inline-block; width: 60px; height: 60px; position: relative;
            border-radius: 12px; overflow: hidden; border: 1px solid #ddd;
            margin-right: 8px; vertical-align: top; animation: menuPop 0.3s forwards;
        }
        .pre-item img { width: 100%; height: 100%; object-fit: cover; }
        .pre-del {
            position: absolute; top: 2px; right: 2px;
            background: rgba(0,0,0,0.5); color: #fff;
            width: 18px; height: 18px; border-radius: 50%;
            font-size: 12px; text-align: center; line-height: 18px; cursor: pointer;
        }

        #upload-progress {
            height: 3px; background: var(--p); width: 0%;
            transition: width 0.3s; position: absolute; top: -3px; left: 0;
            box-shadow: 0 0 10px var(--p);
        }

        .upload-btn {
            width: 34px; height: 34px; border-radius: 50%;
            background: rgba(255,255,255,0.5); color: var(--p);
            border: none; font-size: 20px; font-weight: 300;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.3s;
        }
        .upload-btn:hover { background: #fff; transform: rotate(90deg); }

        #menu {
            position: fixed; display: none;
            background: rgba(255,255,255,0.9); backdrop-filter: blur(20px);
            border-radius: 16px; box-shadow: 0 15px 40px rgba(0,0,0,0.15);
            z-index: 1000; animation: menuPop 0.3s cubic-bezier(0.34,1.56,0.64,1);
            min-width: 130px; overflow: hidden; border: 1px solid rgba(255,255,255,0.4);
        }
        .menu-item { padding: 14px 20px; font-size: 14px; color: #333; cursor: pointer; border-bottom: 0.5px solid rgba(0,0,0,0.05); transition: background 0.2s; }
        .menu-item.danger { color: #ff3b30; font-weight: 500; }
        .menu-item:hover { background: rgba(0,0,0,0.03); }

        #modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.4);
            display: none; z-index: 2000;
            align-items: center; justify-content: center;
            backdrop-filter: blur(10px);
        }
        .modal {
            background: #fff; width: 85%; max-width: 300px;
            border-radius: 24px; padding: 25px;
            animation: menuPop 0.4s cubic-bezier(0.175,0.885,0.32,1.275);
            text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        }
        .modal-btn { width: 100%; padding: 14px; border: none; background: #f5f5f7; border-radius: 14px; margin-top: 10px; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .modal-btn:active { transform: scale(0.96); }

        .footer {
            position: relative; width: 100%;
            background: rgba(225,245,254,0.8);
            backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
            z-index: 100; border-top: 1px solid rgba(255,255,255,0.3);
            display: flex; flex-direction: column; flex-shrink: 0;
        }

        #emoji-panel {
            height: 0; overflow: hidden;
            background: rgba(240,247,255,0.95);
            transition: height 0.25s cubic-bezier(0.32,1,0.23,1);
        }
        #emoji-panel.open {
            height: 300px; overflow-y: auto;
            padding: 15px 15px calc(60px + env(safe-area-inset-bottom));
        }
        .emoji-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 12px; }
        .emoji-item { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.5); border-radius: 12px; cursor: pointer; position: relative; transition: 0.2s; }
        .emoji-item:active { transform: scale(0.9); background: #fff; }
        .emoji-item img { max-width: 85%; max-height: 85%; object-fit: contain; }
        .add-emoji-btn { border: 2px dashed #ccc; color: #999; font-size: 24px; }

        #edit-preview, #quote-preview {
            display: none; padding: 10px 15px;
            background: rgba(255,255,255,0.5);
            border-left: 4px solid var(--accent);
            border-bottom: 1px solid rgba(0,0,0,0.03);
            position: relative; animation: slideUpIn 0.3s;
        }
        #edit-preview { border-left-color: var(--select-blue); }
        .cancel-btn { position: absolute; right: 15px; top: 12px; color: #999; cursor: pointer; font-size: 18px; }

        .input-area {
            padding: 10px 15px calc(12px + env(safe-area-inset-bottom));
            display: flex; gap: 10px; align-items: center; position: relative;
        }
        #emoji-panel.open ~ .input-area { padding-bottom: 12px; }

        #multi-bar {
            position: absolute; inset: 0; background: #fff;
            display: none; align-items: center; justify-content: space-between;
            padding: 0 20px; z-index: 2; animation: slideUpIn 0.3s;
        }
        .multi-btn { color: var(--p); font-weight: bold; cursor: pointer; font-size: 16px; padding: 10px; }

        input#ipt {
            flex: 1; background: rgba(255,255,255,0.6); border-radius: 20px;
            padding: 10px 16px; border: 1px solid rgba(255,255,255,0.8);
            outline: none; font-size: 16px; transition: all 0.3s;
        }
        input#ipt:focus { background: #fff; box-shadow: 0 4px 15px rgba(26,82,118,0.1); }

        #mask {
            position: fixed; inset: 0; background: rgba(0,0,0,0.3);
            display: none; z-index: 99; backdrop-filter: blur(4px);
            opacity: 0; transition: opacity 0.4s ease;
        }
        #mask.show { display: block; opacity: 1; }

        #side {
            position: fixed; top: 0; width: 80%; max-width: 280px; height: 100%;
            background: rgba(255,255,255,0.9); backdrop-filter: blur(30px);
            z-index: 101; padding: 50px 25px; box-sizing: border-box;
            border-right: 1px solid rgba(255,255,255,0.3);
            transform: translateX(-100%);
            transition: transform 0.5s cubic-bezier(0.32,1,0.23,1);
            will-change: transform; left: 0;
        }
        #side.open { transform: translateX(0); box-shadow: 20px 0 60px rgba(0,0,0,0.1); }

        .s-input {
            width: 100%; border: 1px solid #eee; background: #fafafa;
            padding: 12px; border-radius: 12px; box-sizing: border-box;
            margin-top: 10px; outline: none; transition: 0.3s;
        }
        .s-input:focus { border-color: var(--p); background: #fff; }

        .av-setup-area { text-align: center; margin-bottom: 25px; }
        #setup-av-preview {
            width: 85px; height: 85px; border-radius: 50%; background: #eee center/cover;
            margin: 0 auto; cursor: pointer; border: 3px solid #fff;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            position: relative; transition: 0.3s; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
            color: #fff; font-weight: bold; font-size: 30px;
        }
        #setup-av-preview:hover { transform: scale(1.05); }
        #setup-av-preview::after {
            content: '✎'; position: absolute; bottom: 0; left: 0; right: 0;
            background: rgba(0,0,0,0.35); color: #fff; font-size: 16px;
            text-align: center; padding: 4px 0; opacity: 0; transition: 0.3s;
        }
        #setup-av-preview:hover::after { opacity: 1; }

        @keyframes highlight-pulse {
            0%   { box-shadow: 0 0 0 0 rgba(93,173,226,0.6); }
            70%  { box-shadow: 0 0 0 10px rgba(93,173,226,0); }
            100% { box-shadow: 0 0 0 0 rgba(93,173,226,0); }
        }
        .highlight-msg .bubble { animation: highlight-pulse 1s ease 3; }

        #img-viewer {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            display: none; align-items: center; justify-content: center;
            z-index: 9999; cursor: zoom-out;
        }
        #viewer-img { max-width: 95vw; max-height: 95vh; object-fit: contain; border-radius: 8px; }

        .quote-content {
            background: rgba(0,0,0,0.05); border-left: 3px solid var(--accent);
            padding: 4px 8px; border-radius: 4px; font-size: 12px; color: #455a64;
            margin-bottom: 6px; cursor: pointer; display: block;
            max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
            transition: background 0.2s;
        }
        .quote-content:hover { background: rgba(0,0,0,0.1); }
    </style>
</head>
<body onclick="hideMenu()">

<div id="img-viewer" onclick="this.style.display='none'">
    <img id="viewer-img" src="">
</div>

<div id="menu">
    <div class="menu-item danger" id="m-del-sticker" onclick="handleStickerDelete()" style="display:none; font-weight:bold;">删除贴纸</div>
    <div class="menu-item" id="m-replace" onclick="handleMenu('replace')" style="color:var(--select-blue); font-weight:bold;">替换图片</div>
    <div class="menu-item" id="m-edit" onclick="handleMenu('edit')">修改</div>
    <div class="menu-item" id="m-unsend" onclick="handleMenu('unsend')">撤回</div>
    <div class="menu-item" id="m-quote" onclick="handleMenu('quote')">引用</div>
    <div class="menu-item" onclick="handleMenu('multi')">多选</div>
</div>

<div id="modal-overlay" onclick="closeModal()">
    <div class="modal" onclick="event.stopPropagation()">
        <h4 id="modal-title" style="margin:0 0 10px">提示</h4>
        <p id="modal-desc" style="font-size:13px; color:#666; margin-bottom:15px">内容</p>
        <button class="modal-btn" id="modal-confirm-btn" style="color:#ff3b30; background:#fff1f0;">确定</button>
        <button class="modal-btn" id="modal-cancel-btn" onclick="closeModal()">取消</button>
    </div>
</div>

<div class="header">
    <div class="header-inner">
        <div class="av-btn" id="h-av" onclick="event.stopPropagation(); toggleUI(1)"></div>
        <div style="flex:1; text-align:center; font-weight:700; color:var(--p); letter-spacing:1px;"></div>
    </div>
</div>

<div id="unread-badge" onclick="scrollToBottom(true)">有新消息</div>
<div id="chat" onclick="hideMenu()"></div>

<div class="footer">
    <div id="edit-preview">
        <div style="font-size:11px; color:var(--select-blue); font-weight:600">正在修改</div>
        <div style="font-size:13px; color:#666; white-space:nowrap; overflow:hidden; text-overflow:ellipsis" id="ep-text">内容</div>
        <div class="cancel-btn" onclick="cancelEdit()">×</div>
    </div>
    <div id="quote-preview">
        <div style="font-size:11px; color:var(--p); font-weight:600" id="qp-user">用户</div>
        <div style="font-size:13px; color:#666; white-space:nowrap; overflow:hidden; text-overflow:ellipsis" id="qp-text">内容</div>
        <div class="cancel-btn" onclick="cancelQuote()">×</div>
    </div>
    <div id="img-pre-area"></div>
    <div class="input-area">
        <div id="upload-progress"></div>
        <button class="upload-btn" onclick="toggleEmoji()">☺</button>
        <button class="upload-btn" onclick="document.getElementById('f-ipt').click()">+</button>
        <input type="file" id="f-ipt" hidden multiple accept="image/*" onchange="handleImgs(this)">
        <input id="ipt" type="text" placeholder="说点什么..." onkeydown="if(event.keyCode==13)sendMsg()" autocomplete="off" disabled>
        <button onmousedown="event.preventDefault();" onclick="sendMsg()" style="border:none; background:none; color:var(--p); font-weight:bold; font-size:16px; padding:0 10px; cursor:pointer;">发送</button>
        <div id="multi-bar">
            <div class="multi-btn" onclick="cancelMulti()">取消</div>
            <div id="multi-count" style="font-size:14px; color:#666">已选 0 项</div>
            <div class="multi-btn" id="multi-action" style="color:#ff3b30" onclick="handleMultiAction()">撤回</div>
        </div>
    </div>
    <div id="emoji-panel">
        <div class="emoji-grid" id="emoji-list">
            <div class="emoji-item add-emoji-btn" onclick="document.getElementById('sticker-ipt').click()">+</div>
        </div>
        <input type="file" id="sticker-ipt" hidden accept="image/*" onchange="uploadSticker(this)">
    </div>
</div>

<div id="mask" onclick="toggleUI(0)"></div>
<div id="side" onclick="event.stopPropagation()">
    <div id="side-choice">
        <h3 style="color:var(--p); margin-top:0">欢迎</h3>
        <p style="font-size:14px; color:#666; margin-bottom:30px;">请选择进入方式以开始聊天</p>
        <button onclick="switchSideRoom('login')" style="width:100%; padding:15px; background:var(--p); color:#fff; border:none; border-radius:15px; font-weight:bold; margin-bottom:15px; cursor:pointer;">登录</button>
        <button onclick="switchSideRoom('profile')" style="width:100%; padding:15px; background:rgba(26,82,118,0.1); color:var(--p); border:none; border-radius:15px; font-weight:bold; cursor:pointer;">注册</button>
    </div>

<script>
// ─── 配置 ────────────────────────────────────────────────────────────────────
const SB_URL = "https://rscjuhehjehfodxhpsay.supabase.co";
const SB_KEY = "sb_publishable_vLnCZ1bCPh4_-v5btgafjw_L9rLGBiH";
const sb = supabase.createClient(SB_URL, SB_KEY);

// ─── 状态 ────────────────────────────────────────────────────────────────────
let currentUser   = JSON.parse(localStorage.getItem('chat_v12') || 'null');
let stickerList   = JSON.parse(localStorage.getItem('my_stickers_v1') || '[]');
let tempAvatarBase64 = null;
let lastMsgInfo   = { id: null, dom: null };
let lastSenderId  = null;
let activeMsg     = null;
let quoteData     = null;
let editingId     = null;
let longPressTimer;
let isMultiMode   = false;
let selectedSet   = new Set();
let isSending     = false;
let startX = 0, startY = 0, swipeTriggered = false;
let unreadCount   = 0;
let pendingImgs   = [];
let isHistoryLoading = true;
let targetStickerUrl = null;
let activeSticker    = null;

// ─── 缓存（JSON，不含 base64）────────────────────────────────────────────────
const ChatStorage = {
    KEY:      'chat_cache_v13_json',
    POS_KEY:  'chat_scroll_pos',
    MAX_MSGS: 100,

    save(msgs) {
        try {
            const slim = msgs.slice(-this.MAX_MSGS).map(m => {
                const c = { ...m };
                if (c.images) c.images = c.images.filter(s => s?.startsWith('http'));
                return c;
            });
            localStorage.setItem(this.KEY, JSON.stringify(slim));
        } catch (e) {
            if (e.name === 'QuotaExceededError' || e.code === 22)
                localStorage.removeItem(this.KEY);
        }
    },

    load() {
        try {
            const raw = localStorage.getItem(this.KEY);
            if (raw) return JSON.parse(raw);
            // 旧版 HTML 缓存无法直接用，清掉避免占空间
            ['chat_cache_v12_html', 'chat_cache_v11', 'chat_cache_v10'].forEach(k => localStorage.removeItem(k));
            return null;
        } catch { return null; }
    },

    preload() {
        const msgs = this.load();
        if (!msgs?.length) return false;
        msgs.forEach(m => renderMsg(m, true));
        const pos = localStorage.getItem(this.POS_KEY);
        if (pos) document.getElementById('chat').scrollTop = +pos;
        return true;
    },

    saveScroll(pos) {
        try { localStorage.setItem(this.POS_KEY, pos); } catch {}
    }
};

// ─── 工具 ────────────────────────────────────────────────────────────────────
function getMsgColor(str) {
    const colors = ['#2ecc71','#3498db','#9b59b6','#e67e22','#e74c3c','#1abc9c','#f1c40f','#d35400'];
    let h = 0;
    for (let i = 0; i < str.length; i++) h = str.charCodeAt(i) + ((h << 5) - h);
    return colors[Math.abs(h) % colors.length];
}
const getFirstChar = name => name ? name.charAt(0).toUpperCase() : '?';

function updateAvDisplay(el, url, name, id) {
    if (url && !url.includes('api.dicebear.com')) {
        el.style.backgroundImage = `url(${url})`;
        el.innerText = '';
    } else {
        el.style.backgroundImage = 'none';
        el.style.backgroundColor = getMsgColor(id || name);
        el.innerText = getFirstChar(name);
    }
}

// ─── 弹窗 ────────────────────────────────────────────────────────────────────
function showCustomModal({ title, desc, confirmText, cancelText, onConfirm, showCancel = true }) {
    const isDanger = confirmText === '删除' || confirmText === '撤回';
    document.getElementById('modal-title').innerText = title || '提示';
    document.getElementById('modal-desc').innerText  = desc  || '';
    const cBtn = document.getElementById('modal-confirm-btn');
    cBtn.innerText    = confirmText || '确定';
    cBtn.style.color  = isDanger ? '#ff3b30' : '#1a5276';
    cBtn.style.background = isDanger ? '#fff1f0' : '#e1f5fe';
    cBtn.onclick      = () => { onConfirm?.(); closeModal(); };
    const xBtn = document.getElementById('modal-cancel-btn');
    xBtn.style.display = showCancel ? 'block' : 'none';
    if (cancelText) xBtn.innerText = cancelText;
    document.getElementById('modal-overlay').style.display = 'flex';
}
function closeModal() { document.getElementById('modal-overlay').style.display = 'none'; }

// ─── 侧边栏 ──────────────────────────────────────────────────────────────────
function switchSideRoom(room) {
    ['choice','login','profile'].forEach(r =>
        document.getElementById(`side-${r}`).style.display = 'none'
    );
    document.getElementById(`side-${room}`).style.display = 'block';
    if (room === 'profile' && currentUser) {
        document.getElementById('profile-title').innerText = '资料管理';
        const pi = document.getElementById('p-i');
        pi.readOnly = true; pi.style.background = '#f0f0f0';
        document.getElementById('logout-area').style.display = 'block';
        document.getElementById('profile-back').style.display = 'none';
        document.getElementById('save-btn').innerText = '保存修改';
    }
}
function toggleUI(s) {
    const side = document.getElementById('side'), mask = document.getElementById('mask');
    if (s) {
        mask.style.display = 'block';
        requestAnimationFrame(() => { mask.classList.add('show'); side.classList.add('open'); });
    } else {
        side.classList.remove('open'); mask.classList.remove('show');
        setTimeout(() => { if (!side.classList.contains('open')) mask.style.display = 'none'; }, 500);
    }
}

// ─── 初始化 ──────────────────────────────────────────────────────────────────
window.onload = async () => {
    const hasCached = ChatStorage.preload();

    if (currentUser) {
        enableChat();
        updateAvDisplay(document.getElementById('h-av'), currentUser.av, currentUser.name, currentUser.id);
        updateAvDisplay(document.getElementById('setup-av-preview'), currentUser.av, currentUser.name, currentUser.id);
        document.getElementById('p-n').value = currentUser.name;
        document.getElementById('p-i').value = currentUser.id;
        syncUserProfile(currentUser.id).then(() => renderStickers());
        switchSideRoom('profile');
    } else {
        switchSideRoom('choice');
        disableChat();
    }

    // 有缓存时延迟一帧让浏览器先 paint，无缓存时立即加载
    if (hasCached) setTimeout(loadHistory, 0);
    else loadHistory();

    renderStickers();

    const chatBox = document.getElementById('chat');
    const ipt     = document.getElementById('ipt');

    chatBox.onscroll = () => {
        if (isHistoryLoading) return;
        ChatStorage.saveScroll(chatBox.scrollTop);
        if (chatBox.scrollHeight - chatBox.scrollTop - chatBox.clientHeight < 50) hideUnreadBadge();
    };

    ipt.addEventListener('click', () => {
        if (currentUser) return;
        ipt.blur();
        showCustomModal({
            title: '想要参与聊天吗？',
            desc: '您现在可以浏览消息，但需要登录后才能发言。',
            confirmText: '去登录',
            onConfirm: () => { switchSideRoom('login'); toggleUI(1); }
        });
    });


    document.addEventListener('click', e => {
        const side = document.getElementById('side');
        if (side.classList.contains('open') && !side.contains(e.target) && !document.getElementById('h-av').contains(e.target))
            toggleUI(0);
    });

    window.oncontextmenu = e => { e.preventDefault(); return false; };

    sb.channel('tg_realtime')
      .on('postgres_changes', { event: '*', schema: 'public', table: 'messages' }, p => {
          if      (p.eventType === 'INSERT') renderMsg(p.new);
          else if (p.eventType === 'DELETE') removeMsgDOM(p.old.id);
          else if (p.eventType === 'UPDATE') updateMsgDOM(p.new);
      })
      .subscribe();
};

// ─── 历史消息 ────────────────────────────────────────────────────────────────
async function loadHistory() {
    const chatBox = document.getElementById('chat');
    isHistoryLoading = true;

    // 无缓存时，立即插入骨架占位，避免纯空白等待
    const existingIds_check = chatBox.querySelectorAll('.msg[id^="msg-"]');
    let skeletonEl = null;
    if (!existingIds_check.length) {
        skeletonEl = document.createElement('div');
        skeletonEl.style.cssText = 'flex:1;display:flex;align-items:center;justify-content:center;color:rgba(0,0,0,0.2);font-size:14px;';
        skeletonEl.innerText = '加载中…';
        chatBox.appendChild(skeletonEl);
    }

    const existingIds = new Set(
        Array.from(chatBox.querySelectorAll('.msg[id^="msg-"]'))
             .map(el => el.id.slice(4))
    );
    const hasCacheContent = existingIds.size > 0;

    const { data } = await sb.from('messages').select('*').order('created_at', { ascending: true });
    if (!data) { isHistoryLoading = false; return; }

    const serverIds = new Set(data.map(m => String(m.id)));
    if (skeletonEl) skeletonEl.remove();

    // 删掉已撤回的缓存消息
    existingIds.forEach(id => {
        if (!serverIds.has(id)) document.getElementById('msg-' + id)?.remove();
    });

    // 重建末尾状态
    lastMsgInfo = { id: null, dom: null }; lastSenderId = null;
    const remaining = chatBox.querySelectorAll('.msg[id^="msg-"]');
    if (remaining.length) {
        const last = remaining[remaining.length - 1];
        lastMsgInfo = { id: last.dataset.uid || null, dom: last };
        lastSenderId = last.dataset.uid || null;
    }

    // 追加新消息
    const wasAtBottom = chatBox.scrollHeight - chatBox.scrollTop - chatBox.clientHeight < 100;
    let hadNew = false;
    data.forEach(m => {
        if (!document.getElementById('msg-' + m.id)) { renderMsg(m, true); hadNew = true; }
    });

    ChatStorage.save(data);

    requestAnimationFrame(() => {
        if (!hasCacheContent) {
            const pos = localStorage.getItem('chat_scroll_pos');
            chatBox.scrollTop = pos != null ? +pos : chatBox.scrollHeight;
        } else if (hadNew && wasAtBottom) {
            chatBox.scrollTop = chatBox.scrollHeight;
        }
        setTimeout(() => { isHistoryLoading = false; }, 100);
    });
}

// ─── 渲染消息 ────────────────────────────────────────────────────────────────
function renderMsg(m, isHistory = false) {
    // 正式消息替换乐观临时消息（仅当页面上确实有临时气泡时才尝试）
    if (!m.isOptimistic && currentUser && m.unique_id === currentUser.id) {
        const temps = document.querySelectorAll('[id^="msg-temp-"]');
        if (temps.length > 0) {
            for (const el of temps) {
                const tempImg = el.querySelector('.image-album img')?.src;
                const officialImg = m.images?.[0];
                const imgMatch = officialImg && tempImg === officialImg;
                const textMatch = m.content && m.content.trim() && el.innerText.includes(m.content.trim());
                if (imgMatch || textMatch) {
                    el.id = `msg-${m.id}`;
                    const icon = el.querySelector('.status-icon');
                    if (icon) icon.className = 'status-icon status-sent';
                    return;
                }
            }
        }
    }

    if (document.getElementById(`msg-${m.id}`)) return;

    const chatBox  = document.getElementById('chat');
    const isMe     = currentUser && m.unique_id === currentUser.id;
    const timeStr  = new Date(m.created_at || Date.now()).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    const isAtBottom = chatBox.scrollHeight - chatBox.scrollTop - chatBox.clientHeight < 100;
    const isSticker  = m.is_sticker || m.content === '[贴纸]';

    if (lastMsgInfo.id === m.unique_id && lastMsgInfo.dom) {
        lastMsgInfo.dom.classList.add('hide-av');
        lastMsgInfo.dom.classList.remove('tail');
    }
    const isFirstInGroup = m.unique_id !== lastSenderId;
    lastSenderId = m.unique_id;

    const div = document.createElement('div');
    div.className  = `msg ${isMe ? 'msg-out' : 'msg-in'} tail${isHistory ? '' : ' new-anim'}`;
    div.id         = `msg-${m.id}`;
    div.dataset.uid = m.unique_id;
    div.onclick    = () => { if (isMultiMode) toggleSelect(m.id); };

    const albumHTML = m.images?.length
        ? `<div class="image-album album-${Math.min(m.images.length, 4)}">${
              m.images.map(src => `<img src="${src}" oncontextmenu="return false;" draggable="false" onclick="event.stopPropagation();viewImage('${src}')">`).join('')
          }</div>` : '';

    const avatarHTML = (m.avatar_url && !m.avatar_url.includes('api.dicebear.com'))
        ? `<img class="avatar" src="${m.avatar_url}">`
        : `<div class="avatar" style="background-color:${getMsgColor(m.unique_id || m.username)}">${getFirstChar(m.username)}</div>`;

    const statusHTML = isMe
        ? `<span class="status-icon ${m.isOptimistic ? 'status-sending' : 'status-sent'}"></span>` : '';

    div.innerHTML = `
        <div class="checkbox"></div>
        <div class="msg-content-wrapper">
            ${avatarHTML}
            <div class="bubble ${albumHTML ? 'has-img' : ''} ${isSticker ? 'is-sticker' : ''}">
                ${isFirstInGroup && !isMe && !isSticker ? `<span class="u-info">${m.username}</span>` : ''}
                ${m.quote_text ? `<div class="quote-content" onclick="scrollToMsg('${m.quote_id}')"><b>${m.quote_user}:</b> ${m.quote_text}</div>` : ''}
                ${albumHTML}
                ${m.content && !isSticker ? `<span class="text-body">${m.content}</span>` : ''}
                <span class="msg-time">${timeStr}${statusHTML}</span>
            </div>
        </div>`;

    chatBox.appendChild(div);
    bindSuperGestures(div.querySelector('.bubble'), m);
    lastMsgInfo = { id: m.unique_id, dom: div };

    if (!isHistory && (isMe || isAtBottom)) scrollToBottom(true);
    else if (!isHistory) showUnreadBadge();
}

// ─── 实时更新 DOM ─────────────────────────────────────────────────────────────
function removeMsgDOM(id) {
    const el = document.getElementById(`msg-${id}`);
    if (!el) return;
    el.style.maxHeight = el.offsetHeight + 'px';
    el.classList.add(el.classList.contains('msg-out') ? 'deleting-out' : 'deleting-in');
    setTimeout(() => {
        if (lastMsgInfo.dom === el) lastMsgInfo = { id: null, dom: null };
        el.remove();
    }, 600);
}

function updateMsgDOM(m) {
    const el = document.getElementById(`msg-${m.id}`);
    if (!el) return;
    const body = el.querySelector('.text-body');
    if (body) body.innerText = m.content;
    if (m.images?.length) {
        const album = el.querySelector('.image-album');
        if (album) album.innerHTML = m.images.map(src =>
            `<img src="${src}" class="sticker-img" onclick="event.stopPropagation();viewImage('${src}')">`
        ).join('');
    }
    const timeRef = el.querySelector('.msg-time-ref');
    if (timeRef) {
        const d = new Date(m.created_at || Date.now());
        const ts = `${d.getHours()}:${String(d.getMinutes()).padStart(2,'0')}`;
        const statusHTML = (currentUser && m.unique_id === currentUser.id)
            ? `<span class="status-icon status-sent"></span>` : '';
        timeRef.innerHTML = `${ts} ${statusHTML}`;
    }
}

// ─── 手势 ────────────────────────────────────────────────────────────────────
function bindSuperGestures(el, m) {
    el.addEventListener('pointerdown', e => {
        if (isMultiMode) return;
        activeMsg = m; startX = e.clientX; startY = e.clientY; swipeTriggered = false;
        clearTimeout(longPressTimer);
        longPressTimer = setTimeout(() => {
            navigator.vibrate?.(40);
            showMenuAt(startX, startY);
            longPressTimer = null;
        }, 400);
    });

    el.addEventListener('pointermove', e => {
        if (isMultiMode || !activeMsg) return;
        const diffX = startX - e.clientX, diffY = Math.abs(e.clientY - startY);
        if (diffY > 15 && !swipeTriggered) { clearTimeout(longPressTimer); return; }
        if (Math.abs(diffX) > 5) clearTimeout(longPressTimer);
        if (diffX > 5) {
            const wrapper = el.closest('.msg-content-wrapper');
            wrapper.style.transform  = `translateX(-${Math.pow(Math.min(diffX,150), 0.85)}px)`;
            wrapper.style.transition = 'none';
            if (diffX > 33 && !swipeTriggered) {
                swipeTriggered = true; navigator.vibrate?.(15); el.style.filter = 'brightness(1.1)';
            } else if (diffX <= 55 && swipeTriggered) {
                swipeTriggered = false; el.style.filter = 'none';
            }
        }
    });

    el.addEventListener('pointerup', () => {
        clearTimeout(longPressTimer);
        const wrapper = el.closest('.msg-content-wrapper');
        if (wrapper) { wrapper.style.transition = 'transform 0.4s cubic-bezier(0.175,0.885,0.32,1.275)'; wrapper.style.transform = 'translateX(0)'; }
        el.style.filter = 'none';
        if (swipeTriggered) { handleMenu('quote'); swipeTriggered = false; }
    });

    el.addEventListener('pointercancel', () => {
        clearTimeout(longPressTimer);
        const wrapper = el.closest('.msg-content-wrapper');
        if (wrapper) wrapper.style.transform = 'translateX(0)';
    });
}

// ─── 消息菜单 ────────────────────────────────────────────────────────────────
function showMenuAt(x, y) {
    if (!activeMsg || !currentUser) return;
    const isMe   = activeMsg.unique_id === currentUser.id;
    const hasImg = activeMsg.images?.length > 0;
    document.getElementById('m-edit').style.display    = (isMe && activeMsg.content && activeMsg.content !== '[贴纸]') ? 'block' : 'none';
    document.getElementById('m-replace').style.display = (isMe && hasImg && !activeMsg.is_sticker) ? 'block' : 'none';
    const unsendBtn = document.getElementById('m-unsend');
    unsendBtn.innerText = isMe ? '撤回' : '删除';
    unsendBtn.classList.add('danger');

    const menu = document.getElementById('menu');
    menu.style.display = 'block';
    const mw = 130, mh = isMe ? 180 : 130;
    menu.style.left = `${Math.max(10, Math.min(x > window.innerWidth/2 ? x-mw-20 : x+20, window.innerWidth-mw-10))}px`;
    menu.style.top  = `${Math.max(60, Math.min(y > window.innerHeight/2 ? y-mh-20 : y+20, window.innerHeight-mh-80))}px`;
}
function hideMenu() { document.getElementById('menu').style.display = 'none'; }

function handleMenu(type) {
    const ipt = document.getElementById('ipt');
    if (type === 'edit') {
        editingId = activeMsg.id;
        ipt.value = activeMsg.content;
        document.getElementById('ep-text').innerText = activeMsg.content;
        document.getElementById('edit-preview').style.display = 'block';
        cancelQuote(); ipt.focus();
    } else if (type === 'replace') {
        const inp = document.createElement('input');
        inp.type = 'file'; inp.accept = 'image/*';
        inp.onchange = async e => {
            if (e.target.files?.[0]) {
                const b64 = await compressImg(e.target.files[0]);
                try { await sb.from('messages').update({ images: [b64] }).eq('id', activeMsg.id); }
                catch { alert('替换失败'); }
            }
        };
        inp.click();
    } else if (type === 'multi') {
        enterMultiMode();
    } else if (type === 'quote') {
        quoteData = { id: activeMsg.id, user: activeMsg.username, text: activeMsg.content || '[图片]' };
        document.getElementById('qp-user').innerText = quoteData.user;
        document.getElementById('qp-text').innerText = quoteData.text;
        document.getElementById('quote-preview').style.display = 'block';
        cancelEdit(); ipt.focus();
    } else if (type === 'unsend') {
        const isMe = activeMsg.unique_id === currentUser.id;
        showCustomModal({
            title: isMe ? '撤回消息' : '删除消息',
            desc:  isMe ? '确定要撤回这条消息吗？' : '确定要删除这条消息吗？',
            confirmText: isMe ? '撤回' : '删除',
            onConfirm: confirmAction
        });
    }
    hideMenu();
}

function handleMultiAction() {
    if (!selectedSet.size) return;
    const actionType = document.getElementById('multi-action').innerText;
    showCustomModal({
        title: actionType + '选中的消息',
        desc:  `确定要${actionType}这 ${selectedSet.size} 条消息吗？`,
        confirmText: actionType,
        onConfirm: confirmAction
    });
}

async function confirmAction() {
    const targets = isMultiMode ? Array.from(selectedSet) : (activeMsg ? [activeMsg.id] : []);
    if (!targets.length) return;
    const isDelete = document.getElementById('modal-title').innerText.includes('删除');

    targets.forEach(id => {
        const el = document.getElementById(`msg-${id}`);
        if (el) {
            el.style.maxHeight = el.offsetHeight + 'px';
            el.classList.add(el.classList.contains('msg-out') ? 'deleting-out' : 'deleting-in');
        }
    });
    setTimeout(() => { if (isMultiMode) cancelMulti(); }, 300);
    setTimeout(async () => {
        for (const id of targets) {
            try {
                if (!isDelete) await sb.from('messages').delete().eq('id', id);
                const el = document.getElementById(`msg-${id}`);
                if (el) { if (lastMsgInfo.dom === el) lastMsgInfo = { id: null, dom: null }; el.remove(); }
            } catch {}
        }
    }, 600);
}

// ─── 发送消息 ────────────────────────────────────────────────────────────────
async function sendMsg() {
    if (isSending) return;
    const ipt     = document.getElementById('ipt');
    const content = ipt.value.trim();
    if ((!content && !pendingImgs.length) || !currentUser) return;

    // ── 编辑模式：更新已有消息，不新发 ──
    if (editingId) {
        const id = editingId;
        cancelEdit();
        ipt.value = '';
        try {
            await sb.from('messages').update({ content }).eq('id', id);
        } catch { alert('修改失败'); }
        return;
    }

    const imgsToSend    = [...pendingImgs];
    const originalContent = content;
    const tempQuote     = quoteData;

    ipt.value = ''; pendingImgs = []; renderPre();

    const tempId = 'temp-' + Date.now();
    renderMsg({
        id: tempId, username: currentUser.name, unique_id: currentUser.id,
        content: originalContent, avatar_url: currentUser.av,
        images: imgsToSend,
        quote_text: tempQuote?.text, quote_user: tempQuote?.user, quote_id: tempQuote?.id,
        created_at: new Date().toISOString(), isOptimistic: true
    });
    scrollToBottom(true); cancelQuote();

    isSending = true;
    try {
        const { error } = await sb.from('messages').insert([{
            username: currentUser.name, unique_id: currentUser.id,
            content: originalContent, avatar_url: currentUser.av,
            quote_text: tempQuote?.text, quote_user: tempQuote?.user, quote_id: tempQuote?.id,
            images: imgsToSend
        }]);
        if (error) throw error;
    } catch {
        const el = document.getElementById(`msg-${tempId}`);
        if (el) el.style.opacity = '0.5';
        alert('发送失败');
    } finally {
        isSending = false; ipt.focus();
    }
}

async function sendSticker(url) {
    if (isSending || !currentUser) return;
    isSending = true;
    await sb.from('messages').insert([{
        username: currentUser.name, unique_id: currentUser.id,
        content: '[贴纸]', avatar_url: currentUser.av,
        images: [url], is_sticker: true
    }]);
    isSending = false;
}

// ─── 图片处理 ────────────────────────────────────────────────────────────────
function fileToBase64(file) {
    return new Promise(res => {
        const r = new FileReader();
        r.onload = e => res(e.target.result);
        r.readAsDataURL(file);
    });
}

function compressImg(file) {
    return new Promise((resolve, reject) => {
        if (file.type === 'image/gif') { fileToBase64(file).then(resolve).catch(reject); return; }
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = e => {
            const img = new Image();
            img.src = e.target.result;
            img.onload = () => {
                let w = img.width, h = img.height, max = 1200;
                if (w > h && w > max) { h = h * max / w; w = max; }
                else if (h > max)     { w = w * max / h; h = max; }
                const canvas = document.createElement('canvas');
                canvas.width = w; canvas.height = h;
                canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                resolve(canvas.toDataURL('image/jpeg', 0.9));
            };
        };
    });
}

async function handleImgs(input) {
    updateProgress(10);
    for (const file of Array.from(input.files)) {
        pendingImgs.push(await (file.type === 'image/gif' ? fileToBase64(file) : compressImg(file)));
    }
    updateProgress(100); setTimeout(() => updateProgress(0), 500);
    renderPre(); input.value = '';
}

function renderPre() {
    const area = document.getElementById('img-pre-area');
    if (!pendingImgs.length) { area.style.display = 'none'; return; }
    area.style.display = 'flex';
    area.innerHTML = pendingImgs.map((src, i) =>
        `<div class="pre-item"><img src="${src}"><div class="pre-del" onclick="delPre(${i})">×</div></div>`
    ).join('');
}
function delPre(i) { pendingImgs.splice(i, 1); renderPre(); }
function updateProgress(v) { document.getElementById('upload-progress').style.width = v + '%'; }
function viewImage(src) { document.getElementById('viewer-img').src = src; document.getElementById('img-viewer').style.display = 'flex'; }

// ─── 贴纸 ────────────────────────────────────────────────────────────────────
function renderStickers() {
    const list = document.getElementById('emoji-list');
    list.innerHTML = `<div class="emoji-item add-emoji-btn" onclick="document.getElementById('sticker-ipt').click()">+</div>`;
    stickerList.forEach(url => {
        const item = document.createElement('div');
        item.className = 'emoji-item sticker-item';
        item.innerHTML = `<img src="${url}" draggable="false">`;
        item.onclick = () => {
            if (document.getElementById('menu').style.display === 'block') return;
            sendSticker(url);
        };
        let timer;
        item.onpointerdown = e => {
            timer = setTimeout(() => { navigator.vibrate?.(40); targetStickerUrl = url; showStickerMenu(e); timer = null; }, 500);
        };
        item.onpointerup = item.onpointerleave = () => clearTimeout(timer);
        list.appendChild(item);
    });
}

function toggleEmoji() {
    const panel = document.getElementById('emoji-panel');
    if (!panel.classList.contains('open')) {
        document.getElementById('ipt').blur();
        panel.classList.add('open');
        loadStickers();
        setTimeout(() => scrollToBottom(true), 300);
    } else {
        panel.classList.remove('open');
    }
}

async function loadStickers() {
    const container = document.getElementById('sticker-container');
    if (!container) return;
    const { data, error } = await sb.from('stickers').select('*').order('created_at', { ascending: false });
    if (error || !data) return;
    container.innerHTML = '';
    data.forEach(s => {
        const img = document.createElement('img');
        img.src = s.url; img.className = 'sticker-item';
        img.onclick = () => sendSticker(s.url);
        let timer;
        img.addEventListener('pointerdown', e => {
            timer = setTimeout(() => { navigator.vibrate?.(50); activeSticker = s; showStickerContextMenu(e); }, 600);
        });
        img.addEventListener('pointerup',    () => clearTimeout(timer));
        img.addEventListener('pointerleave', () => clearTimeout(timer));
        container.appendChild(img);
    });
}

async function uploadSticker(input) {
    const file = input.files[0];
    if (!file || !currentUser) { alert('请确认已登录账号！'); return; }
    input.disabled = true;
    let prog = 5; updateProgress(prog);
    const timer = setInterval(() => { if (prog < 85) { prog += (85-prog)*0.1; updateProgress(prog); } }, 200);
    try {
        const fileToUpload = file.type === 'image/gif' ? file : await compressImgToBlob(file);
        const ext  = file.type === 'image/gif' ? 'gif' : (file.type.split('/')[1] || 'png');
        const name = `sticker_${Date.now()}_${Math.random().toString(36).slice(-4)}.${ext}`;
        const { error: upErr } = await sb.storage.from('stickers').upload(name, fileToUpload);
        if (upErr) throw upErr;
        prog = 90; updateProgress(90);
        const { data: { publicUrl } } = sb.storage.from('stickers').getPublicUrl(name);
        const newList = [...stickerList, publicUrl];
        const { error: dbErr } = await sb.from('user_profiles').update({ stickers: newList }).eq('unique_id', currentUser.id);
        if (dbErr) throw dbErr;
        clearInterval(timer); updateProgress(100);
        stickerList = newList;
        localStorage.setItem('my_stickers_v1', JSON.stringify(stickerList));
        renderStickers();
        setTimeout(() => { updateProgress(0); input.disabled = false; input.value = ''; }, 1000);
    } catch (err) {
        clearInterval(timer);
        alert('🚨 上传失败: ' + (err.message || '网络请求超时'));
        updateProgress(0); input.disabled = false;
    }
}

function compressImgToBlob(file) {
    return new Promise(resolve => {
        const r = new FileReader();
        r.readAsDataURL(file);
        r.onload = e => {
            const img = new Image();
            img.src = e.target.result;
            img.onload = () => {
                let w = img.width, h = img.height, max = 800;
                if (w > max) { h = h*max/w; w = max; }
                const canvas = document.createElement('canvas');
                canvas.width = w; canvas.height = h;
                const ctx = canvas.getContext('2d');
                ctx.clearRect(0, 0, w, h);
                ctx.drawImage(img, 0, 0, w, h);
                canvas.toBlob(resolve, 'image/png');
            };
        };
    });
}

function showStickerMenu(e) {
    const menu = document.getElementById('menu');
    menu.querySelectorAll('.menu-item').forEach(el => el.style.display = 'none');
    document.getElementById('m-del-sticker').style.display = 'block';
    menu.style.display = 'block';
    const mw = 130, mh = 50;
    const x = e.clientX, y = e.clientY;
    menu.style.left = `${Math.max(10, Math.min(x > window.innerWidth/2 ? x-mw : x, window.innerWidth-mw-10))}px`;
    menu.style.top  = `${Math.max(60, Math.min(y-mh-10, window.innerHeight-100))}px`;
}

function showStickerContextMenu(e) {
    e.preventDefault();
    const menu = document.getElementById('context-menu');
    if (!menu) return;
    menu.innerHTML = `<div class="menu-item danger" style="color:#ff3b30;font-weight:bold;" onclick="executeDeleteSticker()">🗑 删除贴纸</div>`;
    menu.style.display = 'block';
    let x = e.pageX, y = e.pageY;
    if (x + 150 > window.innerWidth) x -= 150;
    if (y + 50  > window.innerHeight) y -= 50;
    menu.style.left = x + 'px'; menu.style.top = y + 'px';
    const hide = () => { menu.style.display = 'none'; document.removeEventListener('click', hide); };
    setTimeout(() => document.addEventListener('click', hide), 10);
}

async function executeDeleteSticker() {
    if (!activeSticker) return;
    if (confirm('确定要删除这张贴纸吗？')) {
        const { error } = await sb.from('stickers').delete().eq('id', activeSticker.id);
        if (error) alert('删除失败');
        else loadStickers();
    }
}

async function handleStickerDelete() {
    if (!targetStickerUrl) return;
    stickerList = stickerList.filter(u => u !== targetStickerUrl);
    localStorage.setItem('my_stickers_v1', JSON.stringify(stickerList));
    renderStickers(); hideMenu();
    navigator.vibrate?.(20);
    await sb.from('user_profiles').update({ stickers: stickerList }).eq('unique_id', currentUser.id);
}

// ─── 滚动 / 未读 ─────────────────────────────────────────────────────────────
function scrollToBottom(smooth = false) {
    const chatBox = document.getElementById('chat');
    chatBox.scrollTo({ top: chatBox.scrollHeight, behavior: smooth ? 'smooth' : 'auto' });
    hideUnreadBadge();
}
function showUnreadBadge() {
    unreadCount++;
    const badge = document.getElementById('unread-badge');
    badge.innerText = `${unreadCount} 条新消息`;
    badge.classList.add('show');
}
function hideUnreadBadge() { unreadCount = 0; document.getElementById('unread-badge').classList.remove('show'); }

// ─── 引用 / 编辑 ─────────────────────────────────────────────────────────────
function cancelQuote() { quoteData = null; document.getElementById('quote-preview').style.display = 'none'; }
function cancelEdit()  { editingId = null; document.getElementById('ipt').value = ''; document.getElementById('edit-preview').style.display = 'none'; }

function scrollToMsg(id) {
    const el = document.getElementById(`msg-${id}`);
    if (!el) return;
    el.scrollIntoView({ behavior: 'smooth', block: 'center' });
    el.classList.remove('highlight-msg');
    void el.offsetWidth;
    el.classList.add('highlight-msg');
    setTimeout(() => el.classList.remove('highlight-msg'), 2000);
}

// ─── 多选 ────────────────────────────────────────────────────────────────────
function enterMultiMode() {
    isMultiMode = true; cancelQuote(); cancelEdit();
    document.getElementById('chat').classList.add('selecting');
    document.getElementById('multi-bar').style.display = 'flex';
    toggleSelect(activeMsg.id);
}
function cancelMulti() {
    isMultiMode = false;
    document.getElementById('chat').classList.remove('selecting');
    document.getElementById('multi-bar').style.display = 'none';
    document.querySelectorAll('.msg.selected').forEach(el => el.classList.remove('selected'));
    selectedSet.clear();
}
function toggleSelect(id) {
    const el = document.getElementById(`msg-${id}`);
    if (!el) return;
    selectedSet.has(id) ? (selectedSet.delete(id), el.classList.remove('selected'))
                        : (selectedSet.add(id),    el.classList.add('selected'));
    updateMultiUI();
}
function updateMultiUI() {
    document.getElementById('multi-count').innerText = `已选 ${selectedSet.size} 项`;
    let hasOther = false;
    selectedSet.forEach(id => {
        const el = document.getElementById(`msg-${id}`);
        if (el && !el.classList.contains('msg-out')) hasOther = true;
    });
    document.getElementById('multi-action').innerText = hasOther ? '删除' : '撤回';
}

// ─── 头像 ────────────────────────────────────────────────────────────────────
async function handleAvatarSelect(input) {
    if (!input.files?.[0]) return;
    try {
        tempAvatarBase64 = await compressImg(input.files[0]);
        updateAvDisplay(document.getElementById('setup-av-preview'), tempAvatarBase64, '', '');
    } catch { alert('图片处理失败'); }
}

function syncMyAvatarsInChat() {
    if (!currentUser) return;
    document.querySelectorAll('.msg-out').forEach(msgEl => {
        const av = msgEl.querySelector('.avatar');
        if (!av) return;
        if (currentUser.av && !currentUser.av.includes('api.dicebear.com')) {
            av.style.backgroundImage = `url(${currentUser.av})`;
            av.style.backgroundColor = ''; av.innerText = '';
        } else {
            av.style.backgroundImage = 'none';
            av.style.backgroundColor = getMsgColor(currentUser.id);
            av.innerText = getFirstChar(currentUser.name);
        }
    });
    updateAvDisplay(document.getElementById('setup-av-preview'), currentUser.av, currentUser.name, currentUser.id);
}

// ─── 账号 ────────────────────────────────────────────────────────────────────
async function syncUserProfile(id) {
    const { data } = await sb.from('user_profiles').select('*').eq('unique_id', id).single();
    if (!data) return false;
    currentUser = { name: data.username, id: data.unique_id, av: data.avatar_url };
    stickerList = data.stickers || [];
    localStorage.setItem('chat_v12', JSON.stringify(currentUser));
    localStorage.setItem('my_stickers_v1', JSON.stringify(stickerList));
    updateAvDisplay(document.getElementById('h-av'), currentUser.av, currentUser.name, currentUser.id);
    renderStickers(); enableChat();
    return true;
}

async function saveData() {
    const n = document.getElementById('p-n').value.trim();
    const i = document.getElementById('p-i').value.trim();
    if (!n || !i) { alert('请填写昵称和ID'); return; }
    const userData = { unique_id: i, username: n, avatar_url: tempAvatarBase64 || currentUser?.avatar_url || '' };
    try {
        const { error } = await sb.from('user_profiles').upsert(userData, { onConflict: 'unique_id' });
        if (error) { alert('保存失败: ' + error.message); return; }
        await syncUserProfile(i);
        tempAvatarBase64 = null;
        toggleUI(0); syncMyAvatarsInChat();
        showCustomModal({ title: '保存成功', desc: '资料已更新！', showCancel: false });
    } catch { alert('发生未知错误，请检查网络'); }
}

async function doLogin() {
    const id  = document.getElementById('login-i').value.trim();
    if (!id) { alert('请输入 ID'); return; }
    const btn = document.getElementById('login-confirm-btn');
    btn.innerText = '验证中...'; btn.disabled = true;
    try {
        const { data } = await sb.from('user_profiles').select('*').eq('unique_id', id).single();
        if (data) {
            currentUser = { name: data.username, id: data.unique_id, av: data.avatar_url };
            localStorage.setItem('chat_v12', JSON.stringify(currentUser));
            toggleUI(0); enableChat();
            updateAvDisplay(document.getElementById('h-av'), currentUser.av, currentUser.name, currentUser.id);
            showCustomModal({ title: '登录成功', desc: '欢迎回来，' + data.username, showCancel: false });
        } else {
            showCustomModal({
                title: '提示', desc: '账号不存在，请先注册',
                confirmText: '去注册',
                onConfirm: () => { switchSideRoom('profile'); document.getElementById('p-i').value = id; }
            });
            switchSideRoom('profile');
            document.getElementById('p-i').value = id;
        }
    } catch { alert('登录出错，请重试'); }
    finally { btn.innerText = '确认登录'; btn.disabled = false; }
}

function doLogout() {
    showCustomModal({
        title: '退出登录', desc: '确定要退出当前账号吗？',
        confirmText: '退出',
        onConfirm: () => { localStorage.removeItem('chat_v12'); location.reload(); }
    });
}

function enableChat()  { const ipt = document.getElementById('ipt'); if (ipt) ipt.disabled = false; }
function disableChat() { const ipt = document.getElementById('ipt'); if (ipt) ipt.disabled = true;  }
</script>
